name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      SWIFTPM_CONFIG_PATH: ${{ github.workspace }}/.swift-cache/.swiftpm
      SWIFTPM_SECURITY_PATH: ${{ github.workspace }}/.swift-cache/.swiftpm
      CLANG_MODULE_CACHE_PATH: ${{ github.workspace }}/.swift-cache/clang
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Swift Cache
        run: mkdir -p .swift-cache/.swiftpm .swift-cache/clang

      - name: Show Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Run Tests (if present)
        run: |
          if [ -d Tests ]; then
            swift test -c release
          else
            echo "No Tests directory found, skipping tests."
          fi

      - name: Build .app Bundle
        run: VERSION=${{ github.ref_name }} BUILD_NUMBER=${{ github.run_number }} ./scripts/build-app.sh

      - name: Package .zip Artifact
        run: VERSION=${{ github.ref_name }} ./scripts/package-zip.sh

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CliproxyStatusBar-${{ github.ref_name }}
          path: |
            dist/CliproxyStatusBar.app
            dist/*.zip

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/CliproxyStatusBar.app
            dist/*.zip
