name: Build macOS App

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build
        run: swift build -c release --product CliproxyStatusBar

      - name: Run Tests (if present)
        run: |
          if [ -d Tests ]; then
            swift test -c release
          else
            echo "No Tests directory found, skipping tests."
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CliproxyStatusBar-macos
          path: .build/release/CliproxyStatusBar
